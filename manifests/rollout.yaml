apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/mihnea03/ci_cd_lab@sha256:73d2719464540848102aa154a6c5685f024a0b0e4c3439fa28145b5926c4bc3d
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
